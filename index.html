<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Central RailanTech</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <div class="top-bar">
        <div class="logo">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="var(--texto-principal)"><path d="M12 2L3 6v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V6l-9-4zm0 2.18l7 3.12v4.7c0 4.67-3.13 8.97-7 10.08-3.87-1.11-7-5.41-7-10.08V7.3l7-3.12z"/></svg>
            RailanTech OSINT
        </div>
        <button class="menu-btn" onclick="toggleMenu()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
        </button>

        <div class="menu-flutuante" id="menuFlutuante">
            <div class="menu-item" onclick="abrirDenuncia()">
                <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                Reportar Ameaça (Dossiê)
            </div>
            <div class="menu-item">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                Sobre a Central
            </div>
            <div class="menu-divisor"></div>
            <div class="menu-item">
                <svg viewBox="0 0 24 24"><path d="M11 18h2v-2h-2v2zm1-16C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-2.21 0-4 1.79-4 4h2c0-1.1.9-2 2-2s2 .9 2 2c0 2-3 1.75-3 5h2c0-2.25 3-2.5 3-5 0-2.21-1.79-4-4-4z"/></svg>
                Ajuda / Suporte
            </div>
        </div>
    </div>

    <div class="main-container">
        
        <h1 class="titulo-central">Olá, Agente. <br><span>Cole o link suspeito para iniciar a varredura.</span></h1>

        <div class="prompt-box">
            <input type="text" id="input-link" placeholder="Ex: correios.com.br-taxa.info..." onkeypress="if(event.key === 'Enter') iniciarVarredura()">
            <button class="btn-enviar" onclick="iniciarVarredura()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>

        <div id="loading-varredura" class="loading">Consultando banco de dados OSINT...</div>

        <div class="resultado-box" id="resultado-box">
            <div class="mensagem-ia" id="mensagem-resposta"></div>
        </div>

        <div id="painel-denuncia">
            <h2 style="font-size: 16px; margin-bottom: 15px; font-weight: 500;">Dossiê de Agente (Envio Seguro)</h2>
            <input type="text" id="agente-nome" class="input-padrao" placeholder="Seu Nome">
            <input type="text" id="agente-contato" class="input-padrao" placeholder="Seu E-mail ou WhatsApp">
            <textarea id="agente-mensagem" class="input-padrao" rows="3" placeholder="Descreva o golpe ou cole o texto do SMS aqui..."></textarea>
            <button class="btn-padrao" onclick="enviarDossie()">Transmitir para a Central</button>
            <div id="loading-denuncia" class="loading">Criptografando...</div>
            <div id="resultado-denuncia" style="margin-top: 15px; font-size: 14px; color: var(--verde-seguro);"></div>
        </div>

    </div>

    <script>
        const URL_CLOUDFLARE = "https://motor-osint-privado.analise-seguranca.workers.dev";

        function toggleMenu() {
            const menu = document.getElementById('menuFlutuante');
            menu.classList.toggle('ativo');
        }

        window.onclick = function(event) {
            if (!event.target.closest('.menu-btn') && !event.target.closest('.menu-flutuante')) {
                document.getElementById('menuFlutuante').classList.remove('ativo');
            }
        }

        function abrirDenuncia() {
            document.getElementById('painel-denuncia').style.display = 'block';
            document.getElementById('resultado-box').style.display = 'none';
            toggleMenu();
        }

        async function iniciarVarredura() {
            const link = document.getElementById('input-link').value;
            const resBox = document.getElementById('resultado-box');
            const msgBox = document.getElementById('mensagem-resposta');
            const loadDiv = document.getElementById('loading-varredura');
            const painelDenuncia = document.getElementById('painel-denuncia');

            if(!link) return;

            painelDenuncia.style.display = 'none';
            resBox.style.display = "none";
            loadDiv.style.display = "block";

            try {
                const response = await fetch(URL_CLOUDFLARE, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ tipo: "link", dado: link })
                });

                const data = await response.json();
                loadDiv.style.display = "none";
                resBox.style.display = "flex";
                
                let textoResposta = data.analise.replace(/\n/g, '<br>');
                msgBox.innerHTML = textoResposta;

                msgBox.className = "mensagem-ia"; 
                if (textoResposta.includes("GOLPE") || textoResposta.includes("CRÍTICA")) {
                    msgBox.classList.add("alerta");
                } else if (textoResposta.includes("LIMPA") || textoResposta.includes("SEGURO")) {
                    msgBox.classList.add("seguro");
                } else {
                    msgBox.classList.add("neutro");
                }

            } catch (e) {
                loadDiv.style.display = "none";
                resBox.style.display = "flex";
                msgBox.className = "mensagem-ia alerta";
                msgBox.innerHTML = "Não foi possível conectar ao servidor OSINT.";
            }
        }

        async function enviarDossie() {
            const nome = document.getElementById('agente-nome').value;
            const contato = document.getElementById('agente-contato').value;
            const mensagem = document.getElementById('agente-mensagem').value;
            const resDiv = document.getElementById('resultado-denuncia');
            const loadDiv = document.getElementById('loading-denuncia');

            if(!mensagem) return;

            resDiv.innerHTML = "";
            loadDiv.style.display = "block";

            try {
                const response = await fetch(URL_CLOUDFLARE, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ alerta: true, nome: nome || "Anônimo", email: contato || "-", mensagem: mensagem })
                });

                const data = await response.json();
                loadDiv.style.display = "none";
                resDiv.innerHTML = data.status;

                document.getElementById('agente-nome').value = '';
                document.getElementById('agente-contato').value = '';
                document.getElementById('agente-mensagem').value = '';

            } catch (e) {
                loadDiv.style.display = "none";
                resDiv.style.color = "var(--vermelho-alerta)";
                resDiv.innerHTML = "Falha no envio da mensagem.";
            }
        }
    </script>
</body>
</html>

<!-- 🚨 RADAR E TRAVA DE SEGURANÇA (JavaScript do index.html) 🚨 -->
<script>
  // ⚠️ A URL OFICIAL DO SEU MOTOR (A COZINHA)
  const workerUrl = "https://motor-osint-privado.analise-seguranca.workers.dev";
  
  const luzRadar = document.getElementById("luz-radar"); // A bolinha visual
  const textoRadar = document.getElementById("texto-radar");
  const botaoEnviar = document.getElementById("botao-denunciar");
  const caixaTexto = document.getElementById("input-dados");

  // 📡 Função que checa o servidor de tempos em tempos
  async function checarRadar() {
    try {
      // O Garçom bate na porta da Cozinha perguntando se está viva
      const resposta = await fetch(`${workerUrl}?comando=ping`);
      
      if (resposta.ok) {
        // 🟢 SISTEMA VIVO E BLINDADO
        luzRadar.style.backgroundColor = "green";
        textoRadar.innerText = "Sistema Online";
        botaoEnviar.disabled = false; // Destrava o botão
        botaoEnviar.style.opacity = "1";
        caixaTexto.disabled = false; // Destrava a digitação
      } else {
        throw new Error("Caiu");
      }
    } catch (erro) {
      // 🔴 SISTEMA MORTO OU OCUPADO
      luzRadar.style.backgroundColor = "red";
      textoRadar.innerText = "Sistema Offline";
      
      // TRAVA SUICIDA ATIVADA: Bloqueia tudo para evitar erros na tela
      botaoEnviar.disabled = true; 
      botaoEnviar.style.opacity = "0.5";
      caixaTexto.disabled = true; 
      caixaTexto.value = "🚨 SISTEMA EM MANUTENÇÃO - AGUARDE...";
    }
  }

  // Liga o radar assim que o site abre
  checarRadar();
  // Fica checando a cada 30 segundos (30000 milissegundos) para economizar
  setInterval(checarRadar, 30000);
</script>

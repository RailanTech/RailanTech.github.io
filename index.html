<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Visual - Ferrovia</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
            transition: background-color 0.5s;
        }

        .cartao {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            font-size: 3em;
            margin: 0;
        }

        /* Animação para chamar a atenção visual (PISCAR) */
        @keyframes alertaPiscar {
            0% { background-color: #ff4d4d; }
            50% { background-color: #8b0000; }
            100% { background-color: #ff4d4d; }
        }

        .estado-alerta {
            animation: alertaPiscar 1s infinite;
            color: white;
        }

        button {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 1.2em;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #333;
            color: white;
        }
    </style>
</head>
<body>

    <div class="cartao" id="painel">
        <h2>Trem Linha 1:</h2>
        <h1 id="textoStatus">🟢 NORMAL (OFICIAL)</h1>
    </div>

    <button onclick="mudarParaAlerta()">Simular Problema no Trem!</button>

    <script>
        // Lógica de Xadrez: Mudar o visual para alertar o cérebro
        function mudarParaAlerta() {
            var body = document.body;
            var painel = document.getElementById("painel");
            var texto = document.getElementById("textoStatus");

            // Ativa o visual de alerta vermelho e muda o texto
            body.classList.add("estado-alerta");
            painel.style.background = "transparent";
            texto.innerHTML = "🔴 PARADO! (Atenção)";
            texto.style.color = "white";
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Anti-Golpe - Railan Tech</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background-color: white; padding: 40px 30px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); text-align: center; max-width: 450px; width: 90%; margin: 20px; }
        h1 { color: #1a73e8; font-size: 26px; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .subtitle { color: #5f6368; margin-bottom: 25px; font-size: 15px; }
        input[type="text"] { width: 90%; padding: 12px 15px; margin-bottom: 20px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; transition: border-color 0.3s; box-sizing: border-box; }
        input[type="text"]:focus { border-color: #1a73e8; outline: none; }
        button { background-color: #1a73e8; color: white; border: none; padding: 14px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; width: 100%; transition: background-color 0.3s; text-transform: uppercase; letter-spacing: 0.5px; }
        button:hover { background-color: #1557b0; }
        #resultado { margin-top: 25px; padding: 20px; border-radius: 8px; text-align: left; font-size: 15px; background-color: #f8f9fa; color: #333; overflow-wrap: break-word; border-left: 5px solid transparent; line-height: 1.6; display: none; }
        #resultado strong { color: #202124; }
        #resultado h3 { margin: 15px 0 5px 0; color: #1a73e8; font-size: 18px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🛡️ Radar Anti-Golpe</h1>
        <div class="subtitle">Verifique se um link é seguro ou golpe.</div>
        <input type="text" id="linkInput" placeholder="Ex: shopee.com.br">
        <button onclick="verificarLink()">⚡ VERIFICAR COM IA</button>
        <div id="resultado"></div>
    </div>

    <script>
        function formatarTexto(texto) {
            return texto
                .replace(/### (.*?)\n/g, '<h3>$1</h3>') 
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>') 
                .replace(/\*(.*?)\*/g, '<em>$1</em>') 
                .replace(/\[SEGURO\]/gi, '') 
                .replace(/\[GOLPE\]/gi, '') 
                .replace(/\n/g, '<br>'); 
        }

        async function verificarLink() {
            const link = document.getElementById('linkInput').value;
            const divResultado = document.getElementById('resultado');

            if (!link) {
                divResultado.style.display = "block";
                divResultado.style.borderLeftColor = "#ea4335"; 
                divResultado.innerHTML = "❌ <b>Por favor, cole um link primeiro!</b>";
                return;
            }

            divResultado.style.display = "block";
            divResultado.style.borderLeftColor = "#fbbc04"; 
            divResultado.innerHTML = "⏳ <b>Analisando cada detalhe do site... aguarde!</b>";

            const url_do_cofre = "https://tiny-lab-bc9b.analise-seguranca.workers.dev";
            
            // 🤖 COMANDO ATUALIZADO (Lógica de Monstro)
            const comando_ia = `Analise este link: ${link}. REGRA MÁXIMA: Comece a sua resposta OBRIGATORIAMENTE digitando a etiqueta secreta [SEGURO] se o site for verdadeiro/oficial, ou a etiqueta [GOLPE] se o site for falso/perigoso. Após a etiqueta, pule uma linha, explique em tópicos e dê dicas de segurança.`;
            
            const payload = {
                contents: [{ parts: [{ text: comando_ia }] }]
            };

            try {
                const resposta_do_cofre = await fetch(url_do_cofre, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const texto_bruto = await resposta_do_cofre.text();
                
                try {
                    const dados = JSON.parse(texto_bruto);
                    
                    if (dados.error) {
                        divResultado.style.borderLeftColor = "#ea4335";
                        divResultado.innerHTML = "🚨 <b>Bloqueio do Google:</b> " + dados.error.message;
                        return;
                    }

                    if (dados.candidates && dados.candidates[0]) {
                        const texto_ia = dados.candidates[0].content.parts[0].text;
                        const texto_maiusculo = texto_ia.toUpperCase();
                        
                        // O Robô agora só dispara o alarme se achar a etiqueta exata [GOLPE]
                        const eh_golpe = texto_maiusculo.includes("[GOLPE]");

                        let status_final = "SEGURO";

                        if (eh_golpe) {
                            status_final = "GOLPE";
                            divResultado.style.borderLeftColor = "#ea4335"; 
                            divResultado.innerHTML = "🚨 <b>ALERTA MÁXIMO DE GOLPE:</b><br>" + formatarTexto(texto_ia);
                        } else {
                            divResultado.style.borderLeftColor = "#34a853"; 
                            divResultado.innerHTML = "✅ <b>Análise Concluída: Seguro</b><br>" + formatarTexto(texto_ia);
                        }

                        // =================================================================
                        // 🤖 O CÉREBRO ESPIÃO DA RAILAN TECH (Invisível)
                        // Cole o seu link gigante de App da Web dentro das aspas abaixo:
                        const url_do_robo = "https://script.google.com/macros/s/AKfycbxsR234grgtgilnf5aHT1bVgCUEW94XVpM5YNvrn_GemDNGB_5ewqHV7Sc7ymcRzAMR/exec"; 
                        // =================================================================
                        
                        if (url_do_robo !== "COLE_AQUI_O_LINK_DO_APP_DA_WEB") {
                            fetch(url_do_robo, {
                                method: 'POST',
                                body: JSON.stringify({ link: link, status: status_final })
                            }).catch(e => console.log("Erro no robô, mas o site segue funcionando."));
                        }
                        
                    } else {
                        divResultado.style.borderLeftColor = "#ea4335";
                        divResultado.innerHTML = "⚠️ <b>Erro de Resposta:</b> " + texto_bruto;
                    }

                } catch (e) {
                    divResultado.style.borderLeftColor = "#ea4335";
                    divResultado.innerHTML = "🚨 <b>Erro no Cofre (Cloudflare):</b> " + texto_bruto;
                }

            } catch (erro) {
                divResultado.style.borderLeftColor = "#ea4335";
                divResultado.innerHTML = "❌ <b>Erro de Conexão:</b> O sistema está offline no momento.";
            }
        }
    </script>
</body>
</html>
